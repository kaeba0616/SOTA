version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./tablet.json:/app/tablet.json:ro
      - ./optimizer:/app/optimizer:ro
      - ./CNN:/app/CNN:ro
      - ./assets:/app/assets:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
